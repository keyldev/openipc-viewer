name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        The project is built in phases with a deliberate scope per phase. Ideas
        are welcome — but note that something fitting a later phase may be parked
        until then. Search existing issues first.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or awkward today?
      placeholder: "When I have 12 cameras, I can't ... because ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Live video / playback
        - Multi-camera grid
        - PTZ / presets
        - Recording
        - Majestic config
        - Discovery / adding cameras
        - Events
        - Settings / UI
        - Packaging / distribution
        - Other
    validations:
      required: false

  - type: dropdown
    id: platforms
    attributes:
      label: Platforms
      multiple: true
      options:
        - Windows
        - Linux
        - macOS
        - Android
        - iOS
        - All
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references to similar apps, etc.
    validations:
      required: false
