name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: macos-14
            rid: osx-arm64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.rid }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install ffmpeg + libsecret (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-extra libsecret-1-0 libsecret-tools

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Fetch bundled ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/fetch-ffmpeg.ps1

      - name: Restore
        run: dotnet restore OpenIPC.Viewer.slnx

      - name: Build
        run: dotnet build OpenIPC.Viewer.slnx --configuration Release --no-restore /warnaserror

      - name: Test
        run: dotnet test OpenIPC.Viewer.slnx --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src/OpenIPC.Viewer.Desktop/OpenIPC.Viewer.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath openipc-viewer-${{ matrix.rid }}.zip

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf ../../openipc-viewer-${{ matrix.rid }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openipc-viewer-${{ matrix.rid }}
          path: openipc-viewer-${{ matrix.rid }}.*
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    name: build (android)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install android workload
        run: dotnet workload install android

      - name: Restore
        run: dotnet restore src/OpenIPC.Viewer.Android/OpenIPC.Viewer.Android.csproj

      - name: Build (Release, warnings as errors)
        run: dotnet build src/OpenIPC.Viewer.Android/OpenIPC.Viewer.Android.csproj -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Publish APK (android-arm64)
        run: dotnet publish src/OpenIPC.Viewer.Android/OpenIPC.Viewer.Android.csproj -c Release -f net10.0-android -r android-arm64 -o publish/android-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openipc-viewer-android-arm64
          path: publish/android-arm64/*-Signed.apk
          if-no-files-found: error

  release:
    needs: [build, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
